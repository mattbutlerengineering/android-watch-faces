name: Android Watch Face CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Run Android Lint
      run: ./gradlew lintDebug

    - name: Run Custom WFF Linter
      run: ./scripts/wff-lint.sh

    - name: Run WFF Validator
      run: |
        # Download the latest WFF Validator
        curl -L -o wff-validator.jar https://github.com/google/watch-face-format-validator/releases/download/v1.0.1/watch-face-format-validator-1.0.1.jar
        
        # Validate each watch face XML
        find . -name "watchface.xml" -print0 | while IFS= read -r -d '' file; do
          echo "Validating $file..."
          java -jar wff-validator.jar "$file"
        done
